<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acompanhamento de Obras</title>
  <style>
    :root{
      --bg:#071a13; --text:#e8fff4; --muted:#b9e6d2; --line:rgba(232,255,244,.12);
      --accent:#7CFCB8; --danger:#ff6b6b; --warn:#ffd166;
      --shadow: 0 10px 35px rgba(0,0,0,.35); --radius:18px;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans); color:var(--text); min-height:100vh; padding:22px;
      background: radial-gradient(1200px 800px at 50% -10%, rgba(124,252,184,.20), transparent 55%),
                  radial-gradient(900px 700px at 100% 20%, rgba(61,220,151,.12), transparent 55%),
                  linear-gradient(180deg, var(--bg), #04110c 70%);
    }
    header{max-width:1200px;margin:0 auto 14px auto;display:flex;gap:14px;align-items:flex-start;justify-content:space-between;}
    .title h1{margin:0;font-size:34px}
    .title .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .rightTop{display:flex;flex-direction:column;gap:10px;align-items:flex-end;min-width:210px;}
    .badgeRow{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .pill{display:inline-flex;align-items:center;gap:8px;background:rgba(124,252,184,.12);
      border:1px solid rgba(124,252,184,.22); color:var(--text); padding:8px 12px;border-radius:999px;font-size:13px;}
    .btn{border:0;cursor:pointer;padding:10px 14px;border-radius:12px;
      background:linear-gradient(180deg, rgba(124,252,184,.22), rgba(61,220,151,.16));
      border:1px solid rgba(124,252,184,.26); color:var(--text); box-shadow:var(--shadow);}
    .btn.secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);box-shadow:none;}
    .wrap{max-width:1200px;margin:0 auto;display:grid;gap:14px;}
    .panel{background:linear-gradient(180deg, rgba(16,56,43,.72), rgba(10,34,26,.66));
      border:1px solid rgba(232,255,244,.12); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;}
    .panelHead{padding:14px 16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .error{
      margin:12px 16px; padding:12px 14px; border-radius:14px;
      border:1px solid rgba(255,107,107,.35); background:rgba(255,107,107,.10);
      color:#ffeaea; white-space:pre-wrap; font-family:var(--mono); font-size:12px; display:none;
    }
    .gridBases{padding:14px 16px 18px 16px;display:grid;grid-template-columns:1fr;gap:12px;}
    .baseBlock{border:1px solid rgba(232,255,244,.12);background:rgba(0,0,0,.10);border-radius:16px;overflow:hidden;}
    .baseHead{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);background:rgba(124,252,184,.08);}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th, td{padding:10px 10px;border-bottom:1px solid rgba(232,255,244,.10);vertical-align:top;}
    th{color:var(--muted);font-weight:600;background:rgba(0,0,0,.10);position:sticky;top:0;z-index:1;text-align:left;}
    .linkBtn{cursor:pointer;padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);color:var(--text);font-size:12px;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:9999;}
    .modal{width:min(560px,100%);background:linear-gradient(180deg, rgba(16,56,43,.92), rgba(10,34,26,.92));
      border:1px solid rgba(232,255,244,.14);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
    .modalHead{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
    .modalHead h3{margin:0;font-size:16px}
    .modalBody{padding:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{color:var(--muted);font-size:13px}
    input{width:100%;background:rgba(0,0,0,.20);border:1px solid rgba(232,255,244,.14);
      color:var(--text);padding:12px 12px;border-radius:14px;outline:none;}
    .rule{color:var(--muted);font-size:13px;padding:10px 0 0 0}
  </style>
</head>

<body>
  <header>
    <div class="title">
      <h1>Acompanhamento de Obras</h1>
      <div class="sub">UTEP Nordeste • Supabase + GitHub Pages</div>
    </div>
    <div class="rightTop">
      <div class="badgeRow">
        <div class="pill" id="todayPill">Data: --/--/----</div>
        <div class="pill" id="authPill" style="display:none">🔒</div>
        <button class="btn secondary" id="btnLogout" style="display:none">Logout</button>
      </div>
      <button class="btn secondary" id="btnReload">Recarregar</button>
    </div>
  </header>

  <div class="wrap">
    <div class="panel">
      <div class="panelHead">
        <div class="pill">Obras</div>
        <div class="actions">
          <button class="btn secondary" id="btnHoje">Hoje</button>
        </div>
      </div>

      <div id="errBox" class="error"></div>
      <div class="gridBases" id="gridBases"></div>
    </div>
  </div>

  <!-- Login -->
  <div class="overlay" id="overlayLogin">
    <div class="modal">
      <div class="modalHead">
        <div>
          <h3>Login</h3>
          <div class="rule">Entre com seu e-mail para receber um link de acesso.</div>
        </div>
      </div>
      <div class="modalBody">
        <div class="field">
          <label>E-mail</label>
          <input id="loginEmail" type="email" autocomplete="email" />
        </div>
        <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn" id="btnSendMagic">Enviar link</button>
          <button class="btn secondary" id="btnLoginHelp">Ajuda</button>
        </div>
        <div class="rule" id="loginMsg">—</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yyfhnuafwzeglwcpnmkd.supabase.co".trim();
    const SUPABASE_ANON_KEY = "sb_publishable_7rmfNL9N6limSSFxFcl2Og_MV9xkbjx".trim();

    // Admin (sem mostrar na UI — só usado para liberar features)
    const ADMIN_EMAIL = "mamutevitor@gmail.com";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);

    function show(el, on){ el.style.display = on ? "flex" : "none"; }
    function showInline(el, on){ el.style.display = on ? "inline-flex" : "none"; }

    function showError(msg){
      const box = $("errBox");
      box.style.display = "block";
      box.textContent = msg;
    }
    function clearError(){
      const box = $("errBox");
      box.style.display = "none";
      box.textContent = "";
    }

    function fmtDateBR(iso){
      const d = new Date(iso);
      if(String(d) === "Invalid Date") return String(iso||"");
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yy = d.getFullYear();
      return `${dd}/${mm}/${yy}`;
    }
    function fmtDateInput(d){
      const yy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      return `${yy}-${mm}-${dd}`;
    }
    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setToday(){
      const now = new Date(); now.setHours(0,0,0,0);
      $("todayPill").textContent = "Data: " + fmtDateBR(now);
    }

    function setAuthUI(email){
      const pill = $("authPill");
      const logout = $("btnLogout");
      if(email){
        pill.textContent = "✅ Acesso ativo";
        showInline(pill, true);
        showInline(logout, true);
      }else{
        pill.textContent = "🔒 Login necessário";
        showInline(pill, true);
        showInline(logout, false);
      }
    }

    async function logout(){
      await sb.auth.signOut();
      await guard();
    }

    async function sendMagicLink(){
      const email = ($("loginEmail").value || "").trim().toLowerCase();
      const msg = $("loginMsg");

      if(!email || !email.includes("@")){
        msg.textContent = "Digite um e-mail válido.";
        msg.style.color = "var(--warn)";
        return;
      }

      // redirect fixo para seu GitHub Pages (importante!)
      const redirectTo = "https://thowosken.github.io/utep-dashboard/";

      msg.textContent = "Enviando link...";
      msg.style.color = "var(--muted)";

      try{
        const { error } = await sb.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: redirectTo }
        });
        if(error) throw error;

        msg.textContent = "Link enviado. Verifique seu e-mail (e spam).";
        msg.style.color = "var(--accent)";
      }catch(e){
        msg.textContent = "Erro ao enviar link: " + (e?.message || e);
        msg.style.color = "var(--danger)";
      }
    }

    async function guard(){
      clearError();
      try{
        const { data: { session } } = await sb.auth.getSession();
        const email = session?.user?.email?.toLowerCase() || null;

        if(!session){
          setAuthUI(null);
          show($("overlayLogin"), true);
          return false;
        }

        setAuthUI(email);
        show($("overlayLogin"), false);

        // Teste de acesso real (RLS): tenta ler 1 item
        const { error } = await sb.from("obras").select("nota", { count:"exact" }).limit(1);
        if(error){
          showError(
`Logado, mas sem acesso aos dados (RLS/policies).

Erro: ${error.message}

Ajuste no Supabase:
- policies de SELECT para usuários autenticados/aprovados
- Redirect URLs (Auth) pro GitHub Pages`
          );
          // mantém login fechado porque já está logado, mas mostra erro
          return false;
        }

        return true;
      }catch(e){
        showError("Erro fatal no app: " + (e?.message || e) + "\n\nDica: abra o Console (F12) e copie o erro.");
        show($("overlayLogin"), true);
        return false;
      }
    }

    async function loadObras(){
      clearError();
      const ok = await guard();
      if(!ok) return;

      // Carrega colunas fixas (ajuste se suas colunas forem diferentes)
      const { data, error } = await sb
        .from("obras")
        .select("nota,projeto,agente_responsavel,base_oper_prog,municipio,criterio,PREVISAO_EXECUCAO_FIM,titulo,status")
        .limit(2000);

      if(error){
        showError("Erro ao carregar obras: " + error.message);
        return;
      }

      // Agrupa por base
      const byBase = new Map();
      for(const r of (data||[])){
        const base = (r.base_oper_prog || "Sem base").toString().trim() || "Sem base";
        if(!byBase.has(base)) byBase.set(base, []);
        byBase.get(base).push(r);
      }

      const container = $("gridBases");
      container.innerHTML = "";

      const bases = Array.from(byBase.keys()).sort((a,b)=>a.localeCompare(b));
      for(const b of bases){
        const list = byBase.get(b);

        const block = document.createElement("div");
        block.className = "baseBlock";
        block.innerHTML = `
          <div class="baseHead">
            <div><b>${escapeHtml(b)}</b></div>
            <div style="color:var(--muted);font-size:13px">${list.length} item(ns)</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Nota</th><th>Projeto</th><th>Agente</th><th>Prazo</th><th>Título</th><th>Município</th><th>Critério</th><th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${list.slice(0,50).map(r=>`
                <tr>
                  <td>${escapeHtml(r.nota ?? "—")}</td>
                  <td>${escapeHtml(r.projeto ?? "—")}</td>
                  <td>${escapeHtml(r.agente_responsavel ?? "—")}</td>
                  <td>${escapeHtml(r.PREVISAO_EXECUCAO_FIM ? fmtDateBR(r.PREVISAO_EXECUCAO_FIM) : "—")}</td>
                  <td>${escapeHtml(r.titulo ?? "—")}</td>
                  <td>${escapeHtml(r.municipio ?? "—")}</td>
                  <td>${escapeHtml(r.criterio ?? "—")}</td>
                  <td>${escapeHtml(r.status ?? "—")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
        container.appendChild(block);
      }
    }

    function init(){
      setToday();

      $("btnSendMagic").addEventListener("click", sendMagicLink);
      $("btnLogout").addEventListener("click", logout);
      $("btnReload").addEventListener("click", loadObras);
      $("btnHoje").addEventListener("click", ()=>{ setToday(); });

      $("btnLoginHelp").addEventListener("click", ()=>{
        alert("Se o link não chega:\n- confira Spam\n- aguarde alguns minutos\n- ou tente outro e-mail.\n\nSe der rate limit, é limitação do provedor.");
      });

      sb.auth.onAuthStateChange(()=> { loadObras(); });

      // start
      loadObras();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
